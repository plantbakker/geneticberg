<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Genetic Distance Map — Vahaduo 23andMe</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0b0f14;
    --panel: #111820;
    --panel2: #161e28;
    --border: #1e2d3d;
    --accent: #00d4aa;
    --accent2: #0077ff;
    --text: #c8d8e8;
    --text-dim: #5a7a9a;
    --close-color: #00e5a0;
    --far-color: #0033cc;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ─────────────────────────────────── */
  #topbar {
    height: 52px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 1000;
    flex-shrink: 0;
  }

  #topbar h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #topbar .divider {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  #search-wrap {
    position: relative;
    flex: 1;
    max-width: 340px;
  }

  #search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }

  #search-input {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px 7px 32px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search-input:focus { border-color: var(--accent); }

  #search-input::placeholder { color: var(--text-dim); }

  #search-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 9999;
  }

  #search-dropdown.open { display: block; }

  .dd-item {
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }

  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover, .dd-item.active { background: rgba(0,212,170,0.1); color: var(--accent); }

  .dd-item .pop-label { color: var(--text-dim); font-size: 10px; margin-top: 2px; }

  /* ── LEGEND / INFO PILL ───────────────────────── */
  #legend {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    white-space: nowrap;
  }

  .legend-swatch {
    width: 80px;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, #00e5a0, #0033cc);
    border: 1px solid var(--border);
  }

  /* ── LAYOUT ───────────────────────────────────── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ──────────────────────────────────── */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  #selected-info {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    min-height: 80px;
  }

  #selected-info .no-sel {
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
    margin-top: 4px;
  }

  #selected-info .sel-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  #selected-info .sel-pop {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  #selected-info .sel-coords {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  #dist-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  #dist-list::-webkit-scrollbar { width: 4px; }
  #dist-list::-webkit-scrollbar-track { background: transparent; }
  #dist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .dist-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(30,45,61,0.5);
  }

  .dist-row:hover { background: rgba(0,212,170,0.05); }

  .dist-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .dist-name {
    font-family: var(--mono);
    font-size: 11px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dist-val {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  #dist-placeholder {
    padding: 20px 16px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
    line-height: 1.7;
  }

  /* ── MAP ──────────────────────────────────────── */
  #map {
    flex: 1;
    background: #0d1520;
  }

  /* Custom Leaflet overrides */
  .leaflet-container { background: #0d1520; }

  .leaflet-tile-pane { filter: brightness(0.55) saturate(0.4) hue-rotate(195deg); }

  .leaflet-control-zoom {
    border: 1px solid var(--border) !important;
    border-radius: 6px !important;
    overflow: hidden;
  }

  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }

  .leaflet-control-zoom a:hover { background: var(--panel2) !important; }

  .leaflet-control-attribution {
    background: rgba(11,15,20,0.7) !important;
    color: var(--text-dim) !important;
    font-size: 9px !important;
  }

  /* Custom marker styles */
  .g-marker {
    cursor: pointer;
    transition: transform 0.15s;
  }

  /* Tooltip */
  .leaflet-tooltip.g-tooltip {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    white-space: nowrap;
    pointer-events: none;
  }

  .leaflet-tooltip.g-tooltip::before { display: none; }

  .g-tooltip .tt-name { font-weight: 600; color: var(--accent); font-size: 12px; }
  .g-tooltip .tt-pop { color: var(--text-dim); margin-top: 2px; }
  .g-tooltip .tt-dist { margin-top: 5px; font-size: 10px; }
  .g-tooltip .tt-dist span { color: var(--accent2); }

  /* Reset button */
  #reset-btn {
    display: none;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  #reset-btn:hover { border-color: var(--accent); color: var(--accent); }
  #reset-btn.visible { display: block; }

  /* Sample count pill */
  .count-pill {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px 8px;
    color: var(--text-dim);
  }

  .count-pill span { color: var(--accent); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>⬡ Genetic Distance Map</h1>
  <div class="divider"></div>
  <div id="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search sample or population…" autocomplete="off" />
    <div id="search-dropdown"></div>
  </div>
  <button id="reset-btn" onclick="resetSelection()">✕ Clear</button>
  <div class="divider"></div>
  <div id="legend">
    <span>Close</span>
    <div class="legend-swatch"></div>
    <span>Far</span>
  </div>
  <div class="divider"></div>
  <div class="count-pill"><span id="count-shown">25</span> samples</div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">Distance Rankings</div>
    <div id="selected-info">
      <div class="no-sel">Click a sample or use search to compute genetic distances.</div>
    </div>
    <div id="dist-list">
      <div id="dist-placeholder">
        Select any sample to rank all others by genetic distance (Fst proxy).
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ═══════════════════════════════════════════════════
//  DATASET — 25 Vahaduo-style 23andMe population samples
//  Each has: id, name, population, region, lat, lng,
//            and a 6-dimensional PCA coordinate vector
//            (used to compute Euclidean distance as Fst proxy)
// ═══════════════════════════════════════════════════
const SAMPLES = [
  { id:  1, name: "NLD_001", population: "Dutch",               region: "Western Europe",    lat: 52.37, lng:  4.90, pca: [ 0.22, 0.11,-0.08, 0.04, 0.01,-0.03] },
  { id:  2, name: "NLD_002", population: "Dutch",               region: "Western Europe",    lat: 51.55, lng:  5.08, pca: [ 0.23, 0.10,-0.09, 0.03, 0.02,-0.02] },
  { id:  3, name: "DEU_001", population: "German",              region: "Western Europe",    lat: 52.52, lng: 13.40, pca: [ 0.20, 0.09,-0.07, 0.05, 0.01,-0.04] },
  { id:  4, name: "GBR_001", population: "British",             region: "Western Europe",    lat: 51.51, lng: -0.13, pca: [ 0.18, 0.14,-0.11, 0.02, 0.00,-0.05] },
  { id:  5, name: "FRA_001", population: "French",              region: "Western Europe",    lat: 48.85, lng:  2.35, pca: [ 0.17, 0.08,-0.06, 0.06, 0.02,-0.03] },
  { id:  6, name: "ITA_001", population: "Italian (North)",     region: "Southern Europe",   lat: 45.46, lng:  9.19, pca: [ 0.12, 0.04,-0.02, 0.12, 0.05, 0.02] },
  { id:  7, name: "ITA_002", population: "Italian (South)",     region: "Southern Europe",   lat: 40.85, lng: 14.27, pca: [ 0.08, 0.00, 0.04, 0.20, 0.10, 0.06] },
  { id:  8, name: "GRC_001", population: "Greek",               region: "Southern Europe",   lat: 37.98, lng: 23.73, pca: [ 0.06,-0.02, 0.07, 0.22, 0.12, 0.08] },
  { id:  9, name: "ESP_001", population: "Spanish",             region: "Southern Europe",   lat: 40.42, lng: -3.70, pca: [ 0.13, 0.05,-0.03, 0.14, 0.07, 0.01] },
  { id: 10, name: "POL_001", population: "Polish",              region: "Eastern Europe",    lat: 52.23, lng: 21.01, pca: [ 0.19, 0.08,-0.06, 0.07, 0.02,-0.02] },
  { id: 11, name: "RUS_001", population: "Russian",             region: "Eastern Europe",    lat: 55.75, lng: 37.62, pca: [ 0.16, 0.06,-0.04, 0.09, 0.04, 0.03] },
  { id: 12, name: "UKR_001", population: "Ukrainian",           region: "Eastern Europe",    lat: 50.45, lng: 30.52, pca: [ 0.17, 0.07,-0.05, 0.08, 0.03, 0.01] },
  { id: 13, name: "FIN_001", population: "Finnish",             region: "Northern Europe",   lat: 60.17, lng: 24.94, pca: [ 0.24, 0.18,-0.14, 0.01,-0.04, 0.02] },
  { id: 14, name: "SWE_001", population: "Swedish",             region: "Northern Europe",   lat: 59.33, lng: 18.07, pca: [ 0.23, 0.16,-0.12, 0.02,-0.02,-0.01] },
  { id: 15, name: "TUR_001", population: "Turkish",             region: "Middle East",       lat: 39.93, lng: 32.86, pca: [ 0.04,-0.06, 0.15, 0.25, 0.18, 0.10] },
  { id: 16, name: "ARM_001", population: "Armenian",            region: "Caucasus",          lat: 40.18, lng: 44.51, pca: [ 0.02,-0.09, 0.18, 0.28, 0.20, 0.12] },
  { id: 17, name: "IRN_001", population: "Iranian",             region: "Middle East",       lat: 35.69, lng: 51.39, pca: [ 0.00,-0.12, 0.20, 0.26, 0.22, 0.14] },
  { id: 18, name: "LBN_001", population: "Lebanese",            region: "Middle East",       lat: 33.89, lng: 35.50, pca: [ 0.01,-0.10, 0.17, 0.27, 0.19, 0.13] },
  { id: 19, name: "EGY_001", population: "Egyptian",            region: "North Africa",      lat: 30.04, lng: 31.24, pca: [-0.05,-0.14, 0.18, 0.24, 0.22, 0.17] },
  { id: 20, name: "MAR_001", population: "Moroccan",            region: "North Africa",      lat: 33.99, lng: -6.85, pca: [-0.02,-0.08, 0.10, 0.18, 0.16, 0.12] },
  { id: 21, name: "ETH_001", population: "Ethiopian",           region: "East Africa",       lat:  9.02, lng: 38.75, pca: [-0.20,-0.18, 0.12, 0.08, 0.15, 0.22] },
  { id: 22, name: "IND_001", population: "Indian (North)",      region: "South Asia",        lat: 28.61, lng: 77.21, pca: [-0.05,-0.15, 0.22, 0.18, 0.28, 0.08] },
  { id: 23, name: "IND_002", population: "Indian (South)",      region: "South Asia",        lat: 13.08, lng: 80.27, pca: [-0.10,-0.18, 0.25, 0.14, 0.32, 0.10] },
  { id: 24, name: "CHN_001", population: "Han Chinese",         region: "East Asia",         lat: 39.90, lng:116.39, pca: [-0.30,-0.05, 0.05,-0.08, 0.10, 0.20] },
  { id: 25, name: "JPN_001", population: "Japanese",            region: "East Asia",         lat: 35.68, lng:139.69, pca: [-0.32,-0.04, 0.04,-0.10, 0.09, 0.22] },
];

// ═══════════════════════════════════════════════════
//  GENETIC DISTANCE — Euclidean in PCA space (Fst proxy)
// ═══════════════════════════════════════════════════
function geneticDistance(a, b) {
  let sum = 0;
  for (let i = 0; i < a.pca.length; i++) {
    sum += (a.pca[i] - b.pca[i]) ** 2;
  }
  return Math.sqrt(sum);
}

// ═══════════════════════════════════════════════════
//  COLOR INTERPOLATION — green → blue gradient
// ═══════════════════════════════════════════════════
function lerpColor(t) {
  // t: 0 = close (green #00e5a0), 1 = far (blue #0033cc)
  const r = Math.round(0   + t * (0   - 0));
  const g = Math.round(229 + t * (51  - 229));
  const b = Math.round(160 + t * (204 - 160));
  return `rgb(${r},${g},${b})`;
}

function hexLerp(t) {
  const clamp = v => Math.max(0, Math.min(255, Math.round(v)));
  const r = clamp(0   + t * 0);
  const g = clamp(229 + t * (51  - 229));
  const b = clamp(160 + t * (204 - 160));
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let selectedSample = null;
let markerMap = {}; // id → leaflet circle marker
let distanceData = []; // [{sample, dist, color}] sorted

// ═══════════════════════════════════════════════════
//  MAP INIT
// ═══════════════════════════════════════════════════
const map = L.map('map', {
  center: [30, 20],
  zoom: 3,
  zoomControl: true,
  attributionControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

// ═══════════════════════════════════════════════════
//  CREATE MARKERS
// ═══════════════════════════════════════════════════
function makeTooltipHTML(sample, dist) {
  let distHtml = '';
  if (dist !== null) {
    distHtml = `<div class="tt-dist">Fst distance: <span>${dist.toFixed(4)}</span></div>`;
  }
  return `
    <div class="tt-name">${sample.name}</div>
    <div class="tt-pop">${sample.population} · ${sample.region}</div>
    <div class="tt-pop" style="font-size:10px;margin-top:2px">${sample.lat.toFixed(2)}°N ${sample.lng.toFixed(2)}°E</div>
    ${distHtml}
  `;
}

SAMPLES.forEach(sample => {
  const marker = L.circleMarker([sample.lat, sample.lng], {
    radius: 9,
    fillColor: '#00d4aa',
    color: '#0b0f14',
    weight: 2,
    fillOpacity: 0.85,
    className: 'g-marker',
  });

  marker.bindTooltip(makeTooltipHTML(sample, null), {
    className: 'g-tooltip',
    direction: 'top',
    offset: [0, -8],
    sticky: false,
  });

  marker.on('click', () => selectSample(sample));
  marker.addTo(map);
  markerMap[sample.id] = marker;
});

// ═══════════════════════════════════════════════════
//  SELECT SAMPLE — compute & display distances
// ═══════════════════════════════════════════════════
function selectSample(sample) {
  selectedSample = sample;

  // Compute distances
  const others = SAMPLES.filter(s => s.id !== sample.id);
  distanceData = others.map(s => ({
    sample: s,
    dist: geneticDistance(sample, s),
  })).sort((a, b) => a.dist - b.dist);

  const maxDist = distanceData[distanceData.length - 1].dist;
  const minDist = distanceData[0].dist;

  // Update marker colors
  // Selected = bright white
  markerMap[sample.id].setStyle({
    fillColor: '#ffffff',
    color: '#00d4aa',
    weight: 3,
    radius: 13,
    fillOpacity: 1,
  });

  distanceData.forEach(({ sample: s, dist }) => {
    const t = maxDist === minDist ? 0 : (dist - minDist) / (maxDist - minDist);
    const col = hexLerp(t);
    markerMap[s.id].setStyle({
      fillColor: col,
      color: '#0b0f14',
      weight: 2,
      radius: 9,
      fillOpacity: 0.9,
    });
    markerMap[s.id].setTooltipContent(makeTooltipHTML(s, dist));
  });

  // Update sidebar selected info
  document.getElementById('selected-info').innerHTML = `
    <div class="sel-name">${sample.name}</div>
    <div class="sel-pop">${sample.population} · ${sample.region}</div>
    <div class="sel-coords">${sample.lat.toFixed(4)}°N, ${sample.lng.toFixed(4)}°E</div>
  `;

  // Update distance list
  const listEl = document.getElementById('dist-list');
  listEl.innerHTML = '';

  distanceData.forEach(({ sample: s, dist }, i) => {
    const t = maxDist === minDist ? 0 : (dist - dist) / (maxDist - minDist);
    const tNorm = maxDist === minDist ? 0 : (dist - minDist) / (maxDist - minDist);
    const col = hexLerp(tNorm);

    const row = document.createElement('div');
    row.className = 'dist-row';
    row.innerHTML = `
      <div class="dist-swatch" style="background:${col}"></div>
      <div class="dist-name">${s.name}<br><span style="color:var(--text-dim);font-size:9px">${s.population}</span></div>
      <div class="dist-val">${dist.toFixed(4)}</div>
    `;
    row.addEventListener('click', () => {
      map.setView([s.lat, s.lng], 5, { animate: true });
      markerMap[s.id].openTooltip();
    });
    listEl.appendChild(row);
  });

  // Show reset button
  document.getElementById('reset-btn').classList.add('visible');
  // Clear search
  document.getElementById('search-input').value = '';
  closeDropdown();
}

// ═══════════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════════
function resetSelection() {
  selectedSample = null;
  distanceData = [];

  SAMPLES.forEach(s => {
    markerMap[s.id].setStyle({
      fillColor: '#00d4aa',
      color: '#0b0f14',
      weight: 2,
      radius: 9,
      fillOpacity: 0.85,
    });
    markerMap[s.id].setTooltipContent(makeTooltipHTML(s, null));
  });

  document.getElementById('selected-info').innerHTML =
    '<div class="no-sel">Click a sample or use search to compute genetic distances.</div>';
  document.getElementById('dist-list').innerHTML =
    '<div id="dist-placeholder">Select any sample to rank all others by genetic distance (Fst proxy).</div>';
  document.getElementById('reset-btn').classList.remove('visible');
}

// ═══════════════════════════════════════════════════
//  SEARCH DROPDOWN
// ═══════════════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const dropdown = document.getElementById('search-dropdown');
let activeIdx = -1;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { closeDropdown(); return; }

  const matches = SAMPLES.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.population.toLowerCase().includes(q) ||
    s.region.toLowerCase().includes(q)
  );

  if (matches.length === 0) { closeDropdown(); return; }

  dropdown.innerHTML = matches.map((s, i) => `
    <div class="dd-item" data-id="${s.id}">
      <div>${s.name}</div>
      <div class="pop-label">${s.population} · ${s.region}</div>
    </div>
  `).join('');

  dropdown.querySelectorAll('.dd-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.id);
      const s = SAMPLES.find(x => x.id === id);
      selectSample(s);
      map.setView([s.lat, s.lng], 5, { animate: true });
      searchInput.value = s.name;
      closeDropdown();
    });
  });

  dropdown.classList.add('open');
  activeIdx = -1;
});

searchInput.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.dd-item');
  if (e.key === 'ArrowDown') {
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'ArrowUp') {
    activeIdx = Math.max(activeIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
  } else if (e.key === 'Enter' && activeIdx >= 0) {
    items[activeIdx]?.click();
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) closeDropdown();
});

function closeDropdown() {
  dropdown.classList.remove('open');
  activeIdx = -1;
}
</script>
</body>
</html>
